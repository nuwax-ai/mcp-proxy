server:
  host: "0.0.0.0"
  port: 8080
  max_file_size: 209715200
  cors_enabled: true

whisper:
  default_model: "base"
  models_dir: "./models"
  auto_download: true
  supported_models:
    - "tiny"
    - "tiny.en"
    - "base"
    - "base.en"
    - "small"
    - "small.en"
    - "medium"
    - "medium.en"
    - "large-v1"
    - "large-v2"
    - "large-v3"
  audio_processing:
    supported_formats:
      - "mp3"
      - "wav"
      - "flac"
      - "m4a"
      - "ogg"
    auto_convert: true
    conversion_timeout: 60
    temp_file_cleanup: true
    temp_file_retention: 300
  workers:
    transcription_workers: 3
    channel_buffer_size: 100
    worker_timeout: 3600

logging:
  level: "info"
  log_dir: "./logs"
  max_file_size: "10MB"
  max_files: 5

daemon:
  pid_file: "./voice-cli.pid"
  log_file: "./logs/daemon.log"
  work_dir: "./"

task_management:
  max_concurrent_tasks: 4
  sqlite_db_path: "./data/tasks.db"
  retry_attempts: 2
  task_timeout_seconds: 3600
  catch_panic: true
  task_retention_minutes: 1440
  sled_db_path: "./data/sled"

tts:
  python_path: "./.venv/Scripts/python.exe"
  model_path: null
  default_model: "default"
  supported_formats:
    - "mp3"
    - "wav"
  max_text_length: 5000
  default_speed: 1.0
  default_pitch: 0
  default_volume: 1.0
  timeout_seconds: 300