# Cargo-dist configuration
# https://dist.axodotdev.com/

[workspace]
# Members remain the same as Cargo.toml
members = ["document-parser", "fastembed", "mcp-common", "mcp-proxy", "mcp-sse-proxy", "mcp-streamable-proxy", "oss-client", "voice-cli"]

[dist]
# Explicitly specify packages to distribute
packages = ["mcp-proxy", "voice-cli", "fastembed", "mcp-streamable-proxy", "mcp-sse-proxy", "mcp-common", "oss-client"]

# document-parser has Linux-only dependencies (Python/MinerU)
# It will only be built for Linux targets via separate CI
[dist.package.document-parser]
dist = false

[build]
targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "aarch64-apple-darwin", "x86_64-pc-windows-msvc", "aarch64-pc-windows-msvc"]
